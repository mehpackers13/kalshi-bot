name: Kalshi Scan

# Runs every 30 minutes — no Mac needed.
# Kalshi markets run 24/7 but the best US markets are active during the day.
# We scan 7am–midnight ET (11:00–04:00 UTC) every 30 minutes.

on:
  schedule:
    - cron: "*/30 11-23 * * *"   # 7am–7pm ET
    - cron: "*/30 0-4 * * *"     # 7pm–midnight ET
  workflow_dispatch:               # Manual trigger from GitHub Actions tab

# Shared lock across ALL kalshi-bot workflows — only one runs at a time.
concurrency:
  group: kalshi-git
  cancel-in-progress: false

permissions:
  contents: write

jobs:

  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scan
        continue-on-error: true
        env:
          KALSHI_API_KEY_ID:         ${{ secrets.KALSHI_API_KEY_ID }}
          KALSHI_PRIVATE_KEY:        ${{ secrets.KALSHI_PRIVATE_KEY }}
          DISCORD_SIGNALS_WEBHOOK:   ${{ secrets.DISCORD_SIGNALS_WEBHOOK }}
          DISCORD_HEALTH_WEBHOOK:    ${{ secrets.DISCORD_HEALTH_WEBHOOK }}
          ANTHROPIC_API_KEY:         ${{ secrets.ANTHROPIC_API_KEY }}
        run: python run_scan.py

      - name: Regenerate dashboard data
        if: always()
        run: python generate_data.py

      - name: Commit and push
        if: always()
        run: |
          git config user.name  "kalshi-bot[actions]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add outcomes.csv bets_placed.csv bot.log data/ docs/data.json 2>/dev/null || true
          git diff --staged --quiet && echo "Nothing to commit." && exit 0
          git commit -m "📊 scan $(date -u '+%Y-%m-%d %H:%M UTC')"
          for attempt in 1 2 3; do
            git fetch origin main
            git rebase -X ours origin/main && git push && echo "Push succeeded on attempt $attempt." && break
            echo "Push attempt $attempt failed — retrying in 15s..."
            git rebase --abort 2>/dev/null || true
            sleep 15
          done
